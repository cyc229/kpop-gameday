<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-POP GAME DAY — 玩家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0010;--surface:#140020;--surface2:#1e0030;--border:rgba(180,80,255,0.3);--purple:#c050ff;--pink:#ff40cc;--yellow:#ffcc00;--teal:#00f0c8;--white:#f5eeff;--muted:rgba(245,238,255,0.5);--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 0%,rgba(140,30,255,0.2) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(255,40,180,0.12) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px;}
.header{text-align:center;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.header img{height:70px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(200,80,255,0.6));}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;background:linear-gradient(135deg,#c050ff,#ff40cc,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:none;}
.header-sub{font-size:11px;color:var(--muted);letter-spacing:4px;margin-top:4px;text-transform:uppercase;}

/* LOGIN */
.login-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px;}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--purple);margin-bottom:6px;text-align:center;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:20px;text-align:center;}
.login-step{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:8px;}
.player-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.ps-btn{padding:12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--white);font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;}
.ps-btn:hover{border-color:var(--purple);}
.ps-btn.selected{border-color:var(--purple);background:rgba(200,80,255,0.15);}
.ps-btn.taken{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.name-input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--white);font-family:'Noto Sans TC',sans-serif;font-size:15px;margin-bottom:14px;outline:none;}
.name-input:focus{border-color:var(--purple);}
.color-label{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:8px;}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;}
.color-swatch{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.2s;position:relative;}
.color-swatch:hover{transform:scale(1.1);}
.color-swatch.selected{border-color:white;transform:scale(1.15);}
.color-swatch.taken{opacity:0.25;cursor:not-allowed;pointer-events:none;}
.color-swatch.selected::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:16px;}
.login-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:2px;transition:all 0.2s;box-shadow:0 4px 16px rgba(200,80,255,0.3);}
.login-btn:hover{transform:translateY(-2px);}
.login-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* MAIN */
.player-header{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:16px;position:relative;}
.ph-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;}
.ph-score{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;margin:4px 0;}
.ph-label{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:4px;color:var(--muted);margin-bottom:10px;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.score-list{display:flex;flex-direction:column;gap:6px;}
.sl-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--surface2);}
.sl-row.me{border:1.5px solid var(--purple);background:rgba(200,80,255,0.1);}
.sl-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;width:24px;}
.sl-name{font-size:14px;font-weight:700;flex:1;}
.sl-score{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--yellow);}
.mission-box{background:var(--surface2);border:1.5px solid var(--purple);border-radius:var(--radius);padding:20px;text-align:center;}
.mission-status-label{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.mission-text{font-size:17px;font-weight:900;color:var(--yellow);line-height:1.5;margin-bottom:14px;padding:12px;background:rgba(255,204,0,0.07);border-radius:10px;border:1px solid rgba(255,204,0,0.2);}
.mission-waiting{font-size:15px;color:var(--muted);line-height:1.7;}

/* ANSWER */
.answer-card-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.answer-game-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--purple);margin-bottom:4px;}
.answer-status-text{font-size:12px;color:var(--muted);margin-bottom:12px;}
.answer-status-text.open{color:var(--teal);}
.answer-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--white);font-family:'Noto Sans TC',sans-serif;font-size:15px;margin-bottom:8px;outline:none;}
.answer-input:focus{border-color:var(--purple);}
.answer-submit-btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all 0.2s;}
.answer-submit-btn:hover{transform:translateY(-1px);}
.answer-submitted-msg{text-align:center;padding:14px;color:var(--teal);font-weight:700;font-size:14px;}
.answers-reveal-grid{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.ar-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--surface2);}
.ar-name{font-size:13px;font-weight:700;width:70px;}
.ar-answer{font-size:14px;font-weight:900;flex:1;}
.correct-answer-banner{background:rgba(0,240,200,0.1);border:1px solid var(--teal);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:14px;font-weight:700;color:var(--teal);text-align:center;}

.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--surface2);border:1.5px solid var(--purple);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;color:var(--white);box-shadow:0 8px 20px rgba(0,0,0,0.4);animation:slideIn 0.3s ease;max-width:260px;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <img src="k-pop game day logo.png" alt="logo" id="logoImg">
    <div class="header-title" id="fallbackTitle">K-POP GAME DAY</div>
    <div class="header-sub">玩家端 · PLAYER</div>
  </div>

  <!-- LOGIN -->
  <div id="loginSection">
    <div class="login-box">
      <div class="login-title">加入遊戲</div>
      <div class="login-sub">選擇你是誰，然後自訂名稱和顏色</div>

      <div class="login-step">STEP 1 — 選擇你是誰</div>
      <div class="player-select-grid" id="playerSelectGrid"></div>

      <div id="customizeSection" style="display:none">
        <div class="login-step">STEP 2 — 修改名稱（可選）</div>
        <input class="name-input" id="nameInput" placeholder="輸入你想顯示的名稱">

        <div class="color-label">STEP 3 — 選擇你的顏色</div>
        <div class="color-grid" id="colorGrid"></div>
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()" disabled>進入遊戲 ▶</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="mainSection" style="display:none">
    <div class="player-header">
      <div class="ph-label">玩家</div>
      <div class="ph-name" id="phName"></div>
      <div class="ph-score" id="phScore">0</div>
      <div class="ph-label">總分</div>
    </div>

    <div class="card">
      <div class="section-title">目前分數</div>
      <div class="score-list" id="scoreList"></div>
    </div>

    <div class="card">
      <div class="section-title">🕵️ 我的秘密任務</div>
      <div class="mission-box" id="missionBox">
        <div class="mission-waiting">等待抽籤中⋯<br><span style="font-size:12px;opacity:0.6">走到主持人那裡抽取你的任務</span></div>
      </div>
    </div>

    <div id="answerSection"></div>
  </div>
</div>
<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyCxooQDoIoUTzLXXmJ33_woXAQ2eP2UYrQ",authDomain:"kpop-gameday.firebaseapp.com",databaseURL:"https://kpop-gameday-default-rtdb.firebaseio.com",projectId:"kpop-gameday",storageBucket:"kpop-gameday.firebasestorage.app",messagingSenderId:"993002749510",appId:"1:993002749510:web:020c1121f4ba3f95395447"};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

// Listen game state
onValue(ref(db,'gameState'),snap=>{
  if(snap.exists()){window._gameState=snap.val();if(window._myPlayerId!==undefined)updateMainView(window._gameState);}
});
// Listen answer rounds
onValue(ref(db,'answerRound'),snap=>{
  window._answerRounds=snap.exists()?snap.val():{};
  if(window._myPlayerId!==undefined)renderAnswerSection();
});
// Listen all answers (for reveal)
onValue(ref(db,'answers'),snap=>{
  window._allAnswers=snap.exists()?snap.val():{};
  if(window._myPlayerId!==undefined)renderAnswerSection();
});
// Listen online players
onValue(ref(db,'players'),snap=>{
  window._onlineData=snap.exists()?snap.val():{};
  renderPlayerSelect();
});

window._submitAnswer=function(game,pid,answer){
  set(ref(db,`answers/${game}/${pid}`),{answer,ts:Date.now()});
};
window._registerPlayer=function(pid,name,color){
  set(ref(db,`players/${pid}`),{id:pid,name,color,ts:Date.now()});
};
</script>

<script>
const DEFAULT_PLAYERS=[
  {id:0,name:'李明翰',color:'#c050ff'},{id:1,name:'葵',color:'#ff50aa'},
  {id:2,name:'蒲姿羽',color:'#00d4ff'},{id:3,name:'莊子萱',color:'#ffe000'},
  {id:4,name:'簡',color:'#ff8040'},{id:5,name:'Huan',color:'#40e090'},
  {id:6,name:'酥函',color:'#ff4060'},{id:7,name:'Mio',color:'#80aaff'},
  {id:8,name:'美嘉',color:'#ff80cc'}
];

const COLORS=['#c050ff','#ff40cc','#ff4060','#ff8040','#ffe000','#40e090','#00d4ff','#80aaff','#ff80cc','#00f0c8'];
const ANSWER_GAMES=['Emoji猜歌','韓文翻中文','混音猜歌'];

window._myPlayerId=undefined;
window._myColor='#c050ff';
window._myName='';
window._gameState=null;
window._answerRounds={};
window._allAnswers={};
window._onlineData={};
window._submittedAnswers={};

let selectedId=null;
let selectedColor=null;

function getOnlinePlayers(){return Object.values(window._onlineData||{});}
function getTakenColors(){return getOnlinePlayers().filter(p=>p.id!==selectedId).map(p=>p.color);}

function renderPlayerSelect(){
  const online=getOnlinePlayers();
  const takenIds=online.map(p=>p.id);
  document.getElementById('playerSelectGrid').innerHTML=DEFAULT_PLAYERS.map(p=>{
    const taken=takenIds.includes(p.id)&&p.id!==selectedId;
    return`<button class="ps-btn ${taken?'taken':''} ${selectedId===p.id?'selected':''}"
      style="${selectedId===p.id?'border-color:'+window._myColor+';color:'+window._myColor:''}"
      onclick="selectPlayer(${p.id})">${p.name}</button>`;
  }).join('');
}

window.selectPlayer=function(id){
  selectedId=id;
  const p=DEFAULT_PLAYERS[id];
  const online=window._onlineData[id];
  document.getElementById('nameInput').value=online?online.name:p.name;
  window._myName=online?online.name:p.name;
  selectedColor=online?online.color:p.color;
  window._myColor=selectedColor;
  document.getElementById('customizeSection').style.display='block';
  document.getElementById('loginBtn').disabled=false;
  renderPlayerSelect();
  renderColorGrid();
};

function renderColorGrid(){
  const taken=getTakenColors();
  document.getElementById('colorGrid').innerHTML=COLORS.map(c=>{
    const isTaken=taken.includes(c)&&c!==selectedColor;
    return`<div class="color-swatch ${isTaken?'taken':''} ${selectedColor===c?'selected':''}"
      style="background:${c}" onclick="selectColor('${c}')"></div>`;
  }).join('');
}

window.selectColor=function(c){
  selectedColor=c;window._myColor=c;
  renderColorGrid();renderPlayerSelect();
};

window.doLogin=function(){
  if(selectedId===null)return;
  const nameVal=document.getElementById('nameInput').value.trim();
  window._myPlayerId=selectedId;
  window._myName=nameVal||DEFAULT_PLAYERS[selectedId].name;
  window._myColor=selectedColor||DEFAULT_PLAYERS[selectedId].color;
  if(window._registerPlayer)window._registerPlayer(selectedId,window._myName,window._myColor);
  document.getElementById('loginSection').style.display='none';
  document.getElementById('mainSection').style.display='block';
  document.getElementById('phName').textContent=window._myName;
  document.getElementById('phName').style.color=window._myColor;
  document.getElementById('phScore').style.color=window._myColor;
  if(window._gameState)updateMainView(window._gameState);
  renderAnswerSection();
  toast(`歡迎 ${window._myName}！準備好了嗎 🎤`);
};

function updateMainView(data){
  const pid=window._myPlayerId;if(pid===undefined)return;
  // score
  const scores=data.scores||{};
  document.getElementById('phScore').textContent=scores[pid]||0;
  // scoreboard - get player names from online data
  const allPlayers=DEFAULT_PLAYERS.map(p=>{
    const online=window._onlineData[p.id];
    return{...p,name:online?online.name:p.name,color:online?online.color:p.color,score:scores[p.id]||0};
  });
  const sorted=[...allPlayers].sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  document.getElementById('scoreList').innerHTML=sorted.map((p,i)=>`
    <div class="sl-row ${p.id===pid?'me':''}">
      <div class="sl-rank" style="color:${p.color}">${i<3?medals[i]:(i+1)}</div>
      <div class="sl-name" style="color:${p.color}">${p.name}${p.id===pid?' (我)':''}</div>
      <div class="sl-score">${p.score}</div>
    </div>`).join('');
  // mission
  const assigned=data.missionAssigned||{};
  const done=data.missionDone||{};
  const failed=data.missionFailed||{};
  const mbox=document.getElementById('missionBox');
  if(assigned[pid]){
    const stateLabel=done[pid]?'<div style="color:var(--teal);font-size:13px;margin-top:6px">✅ 任務完成！</div>':failed[pid]?'<div style="color:var(--pink);font-size:13px;margin-top:6px">❌ 任務失敗</div>':'<div style="font-size:11px;color:var(--muted);margin-top:8px">完成後向主持人宣告！</div>';
    mbox.innerHTML=`<div class="mission-status-label">你的秘密任務</div><div class="mission-text">${assigned[pid]}</div>${stateLabel}`;
  }
}

function renderAnswerSection(){
  const pid=window._myPlayerId;if(pid===undefined)return;
  const rounds=window._answerRounds||{};
  const allAnswers=window._allAnswers||{};
  let html='';
  ANSWER_GAMES.forEach(g=>{
    const round=rounds[g]||{};
    const isOpen=round.open;
    const isRevealed=round.revealed;
    const myAnswer=allAnswers[g]?allAnswers[g][pid]:null;
    const submitted=window._submittedAnswers[g];
    if(!isOpen&&!isRevealed)return; // 未開放不顯示
    html+=`<div class="answer-card-box">
      <div class="answer-game-title">${g}</div>`;
    if(isRevealed){
      // show all answers
      html+=`<div class="answer-status-text">✓ 答案已公布</div>`;
      if(round.correctAnswer){html+=`<div class="correct-answer-banner">✅ 正確答案：${round.correctAnswer}</div>`;}
      const allPlayers=DEFAULT_PLAYERS.map(p=>{const online=window._onlineData[p.id];return{...p,name:online?online.name:p.name,color:online?online.color:p.color};});
      html+=`<div class="answers-reveal-grid">`;
      allPlayers.forEach(p=>{
        const a=allAnswers[g]?allAnswers[g][p.id]:null;
        html+=`<div class="ar-row"><div class="ar-name" style="color:${p.color}">${p.name}</div><div class="ar-answer">${a?a.answer:'—'}</div></div>`;
      });
      html+=`</div>`;
    } else if(isOpen){
      html+=`<div class="answer-status-text open">● 作答中！</div>`;
      if(submitted||myAnswer){
        html+=`<div class="answer-submitted-msg">✅ 已送出：${myAnswer?myAnswer.answer:submitted}<br><span style="font-size:11px;opacity:0.6">等待主持人公布答案</span></div>`;
      } else {
        html+=`<input class="answer-input" id="answerInput_${g.replace(/\s/g,'_')}" placeholder="輸入答案（團名 / 歌名）" autocomplete="off">
        <button class="answer-submit-btn" onclick="submitAnswer('${g}')">送出答案 ✓</button>`;
      }
    }
    html+=`</div>`;
  });
  document.getElementById('answerSection').innerHTML=html||'';
}

window.submitAnswer=function(game){
  const pid=window._myPlayerId;if(pid===undefined)return;
  const inputId=`answerInput_${game.replace(/\s/g,'_')}`;
  const val=document.getElementById(inputId)?.value.trim();
  if(!val){toast('請輸入答案！');return;}
  window._submittedAnswers[game]=val;
  if(window._submitAnswer)window._submitAnswer(game,pid,val);
  renderAnswerSection();
  toast('答案已送出！✅');
};

function toast(msg){const wrap=document.getElementById('toastWrap');const el=document.createElement('div');el.className='toast';el.textContent=msg;wrap.appendChild(el);setTimeout(()=>el.remove(),3000);}

document.getElementById('logoImg').onerror=function(){this.style.display='none';document.getElementById('fallbackTitle').style.display='block';};

renderPlayerSelect();
</script>
</body>
</html>
