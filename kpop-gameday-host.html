<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-POP GAME DAY — 主控端</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0010;--surface:#140020;--surface2:#1e0030;--border:rgba(180,80,255,0.3);--purple:#c050ff;--pink:#ff40cc;--yellow:#ffcc00;--gold:#ffd700;--teal:#00f0c8;--white:#f5eeff;--muted:rgba(245,238,255,0.5);--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 0%,rgba(140,30,255,0.2) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(255,40,180,0.12) 0%,transparent 60%),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(180,80,255,0.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(180,80,255,0.03) 40px);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:16px;}
.header{text-align:center;padding:16px 0 12px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.header img{height:80px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(200,80,255,0.6));}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:4px;background:linear-gradient(135deg,#c050ff,#ff40cc,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:none;}
.header-sub{font-size:11px;color:var(--muted);letter-spacing:5px;margin-top:4px;text-transform:uppercase;}
.nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.nav-btn{padding:8px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
.nav-btn:hover{border-color:var(--purple);color:var(--white);}
.nav-btn.active{background:linear-gradient(135deg,var(--purple),var(--pink));border-color:transparent;color:white;box-shadow:0 4px 16px rgba(200,80,255,0.4);}
.panel{display:none;}.panel.active{display:block;}
.timer-bar{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--white);letter-spacing:2px;line-height:1;min-width:80px;}
.timer-display.warning{color:var(--pink);}
.timer-controls{display:flex;gap:6px;flex-wrap:wrap;}
.tbtn{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--white);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.tbtn:hover{border-color:var(--purple);}
.tbtn.primary{background:linear-gradient(135deg,var(--purple),var(--pink));border-color:transparent;box-shadow:0 2px 10px rgba(200,80,255,0.3);}
.timer-label{font-size:11px;color:var(--muted);margin-left:auto;letter-spacing:2px;}
/* SCORE */
.leaderboard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;}
.lb-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:4px;color:var(--muted);margin-bottom:10px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.lb-row:last-child{border-bottom:none;}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:18px;width:24px;color:var(--muted);}
.lb-name{font-size:13px;font-weight:700;width:70px;}
.lb-bar-wrap{flex:1;height:7px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;}
.lb-bar{height:100%;border-radius:4px;transition:width 0.5s ease;}
.lb-pts{font-family:'Bebas Neue',sans-serif;font-size:18px;width:40px;text-align:right;color:var(--yellow);}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.player-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;position:relative;overflow:hidden;}
.player-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--player-color,var(--purple));}
.player-avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:white;font-weight:900;}
.player-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.player-score{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;margin-bottom:6px;}
.rank-badge{position:absolute;top:8px;right:8px;font-family:'Bebas Neue',sans-serif;font-size:11px;padding:2px 7px;border-radius:100px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.rank-badge.gold{background:rgba(255,215,0,0.18);color:var(--gold);border-color:var(--gold);}
.rank-badge.silver{background:rgba(200,200,220,0.12);color:#c8c8dc;border-color:#c8c8dc;}
.rank-badge.bronze{background:rgba(200,140,80,0.12);color:#c88c50;border-color:#c88c50;}
.mbadge{position:absolute;top:8px;left:8px;font-size:12px;}
.score-controls{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;}
.sbtn{padding:3px 7px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--white);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.sbtn:hover{background:var(--purple);border-color:var(--purple);}
.sbtn.minus{color:var(--muted);}
.sbtn.minus:hover{background:rgba(255,80,120,0.25);border-color:var(--pink);color:var(--pink);}
/* BREAKDOWN */
.game-select-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.game-tag{padding:5px 12px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.game-tag.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,204,0,0.1);}
.game-score-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.game-score-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--yellow);margin-bottom:10px;}
.game-score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.gpi{background:var(--surface2);border-radius:10px;padding:10px;text-align:center;}
.gpi-name{font-size:11px;color:var(--muted);margin-bottom:4px;}
.gpi-pts{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.gpi-ctrl{display:flex;gap:3px;justify-content:center;margin-top:5px;}
.detail-table{width:100%;border-collapse:collapse;font-size:11px;}
.detail-table th{background:var(--surface2);color:var(--muted);padding:7px 8px;text-align:center;font-weight:700;letter-spacing:1px;border:1px solid rgba(255,255,255,0.06);}
.detail-table td{padding:7px 8px;text-align:center;border:1px solid rgba(255,255,255,0.06);}
.detail-table tr:nth-child(even) td{background:rgba(255,255,255,0.02);}
.tc{color:var(--yellow);font-family:'Bebas Neue',sans-serif;font-size:15px;}
.pc{font-weight:700;text-align:left;}
/* ANSWERS */
.answer-game-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.answer-panel-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.answer-panel-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--purple);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.asbadge{font-size:10px;padding:2px 8px;border-radius:100px;border:1px solid var(--border);color:var(--muted);letter-spacing:2px;}
.asbadge.open{border-color:var(--teal);color:var(--teal);}
.q-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.q-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);letter-spacing:2px;}
.q-total{font-size:13px;color:var(--muted);}
.correct-answer-display{background:rgba(0,240,200,0.08);border:1px solid var(--teal);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px;font-weight:700;color:var(--teal);}
.ctrl-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.open-btn{padding:10px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--teal),#00b090);color:#0a0010;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all 0.2s;}
.open-btn:hover{transform:translateY(-1px);}
.reveal-btn{padding:10px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--yellow),#cc8800);color:#0a0010;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all 0.2s;}
.reveal-btn:hover{transform:translateY(-1px);}
.reveal-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.next-btn{padding:10px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all 0.2s;}
.next-btn:hover{transform:translateY(-1px);}
.answers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.ac{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.ac.has{border-color:var(--purple);}
.ac-name{font-size:11px;font-weight:700;margin-bottom:5px;}
.ac-text{font-size:13px;font-weight:900;color:var(--yellow);min-height:18px;word-break:break-all;}
.ac-text.blur{filter:blur(5px);user-select:none;}
.ac-wait{font-size:11px;color:var(--muted);}
/* MISSION */
.mission-inner{max-width:520px;margin:0 auto;}
.mission-big-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;color:var(--purple);text-align:center;margin-bottom:6px;}
.mission-sub{text-align:center;color:var(--muted);font-size:12px;margin-bottom:18px;line-height:1.7;}
.draw-area{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;}
.draw-select{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--white);font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;outline:none;cursor:pointer;}
.draw-btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:900;cursor:pointer;letter-spacing:2px;transition:all 0.2s;}
.draw-btn:hover{transform:translateY(-2px);}
.draw-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.mission-reveal{background:var(--surface2);border:1.5px solid var(--purple);border-radius:var(--radius);padding:22px;text-align:center;display:none;box-shadow:0 0 40px rgba(200,80,255,0.2);margin-bottom:12px;}
.reveal-label{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.reveal-player{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--white);margin-bottom:14px;letter-spacing:2px;}
.reveal-task{font-size:17px;font-weight:900;color:var(--yellow);line-height:1.5;margin-bottom:14px;padding:12px;background:rgba(255,204,0,0.07);border-radius:10px;border:1px solid rgba(255,204,0,0.2);}
.confirm-btn{padding:8px 22px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.confirm-btn:hover{border-color:var(--purple);color:var(--white);}
.msbox{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;}
.mstitle{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--muted);margin-bottom:10px;}
.mrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.mrow:last-child{border-bottom:none;}
.mdot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;}
.mdot.drawn{background:var(--purple);}.mdot.done{background:var(--teal);}.mdot.failed{background:var(--pink);}
.mname{font-size:13px;font-weight:700;flex:1;}.mstate{font-size:11px;color:var(--muted);}
.mbtns{display:flex;gap:5px;}
.mcbtn{padding:3px 10px;border-radius:7px;border:1px solid var(--teal);background:transparent;color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;}
.mcbtn:hover{background:rgba(0,240,200,0.15);}
.mfbtn{padding:3px 10px;border-radius:7px;border:1px solid var(--pink);background:transparent;color:var(--pink);font-size:11px;font-weight:700;cursor:pointer;}
.mfbtn:hover{background:rgba(255,80,160,0.15);}
/* GROUP */
.group-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.group-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--purple);margin-bottom:12px;}
.group-tabs{display:flex;gap:8px;margin-bottom:14px;}
.group-tab{padding:8px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.group-tab.active{background:linear-gradient(135deg,var(--purple),var(--pink));border-color:transparent;color:white;}
.team-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.team-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.team-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px;}
.team-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;margin-bottom:8px;}
.team-members{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:28px;}
.tmc{padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);}
.team-score-big{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--white);text-align:center;margin-bottom:8px;}
.team-add-btn{width:100%;padding:9px;border-radius:10px;border:none;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all 0.2s;}
.team-add-btn:hover{transform:translateY(-1px);}
.upool{margin-bottom:12px;}.upool-title{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:7px;}
.uchips{display:flex;flex-wrap:wrap;gap:5px;}
.uchip{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;background:var(--surface2);border:1.5px solid var(--border);color:var(--white);transition:all 0.15s;}
.uchip:hover{border-color:var(--purple);}
.dance-score-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
/* AWARD */
.award-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:100;align-items:center;justify-content:center;flex-direction:column;}
.award-overlay.show{display:flex;}
.award-box{text-align:center;max-width:520px;width:90%;position:relative;z-index:2;}
.award-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;background:linear-gradient(135deg,var(--yellow),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px;}
.reveal-step{display:none;text-align:center;}
.reveal-step.show{display:block;}
.reveal-rank-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--muted);margin-bottom:8px;}
.reveal-medal{font-size:80px;animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.reveal-name{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;margin-bottom:6px;}
.reveal-score{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--yellow);}
.reveal-avatar{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:40px;color:white;margin:0 auto 16px;border:4px solid rgba(255,255,255,0.2);box-shadow:0 0 40px rgba(200,80,255,0.4);}
.award-next-btn{margin-top:20px;padding:12px 32px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(200,80,255,0.3);}
.award-next-btn:hover{transform:translateY(-2px);}
.close-award{margin-top:16px;padding:10px 28px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;}
.close-award:hover{border-color:var(--purple);color:var(--white);}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:1;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.slabel{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:4px;color:var(--muted);margin-bottom:10px;}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--surface2);border:1.5px solid var(--purple);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;color:var(--white);box-shadow:0 8px 20px rgba(0,0,0,0.4);animation:slideIn 0.3s ease;max-width:260px;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.reset-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--pink);background:transparent;color:var(--pink);font-size:11px;font-weight:700;cursor:pointer;margin-left:auto;}
.reset-btn:hover{background:rgba(255,80,160,0.15);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <img src="k-pop game day logo.png" alt="logo" id="logoImg">
    <div class="header-title" id="fallbackTitle">K-POP GAME DAY</div>
    <div class="header-sub">主控端 · HOST</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('score',this)">🏆 計分 / 明細</button>
    <button class="nav-btn" onclick="switchTab('answers',this)">✏️ 答題</button>
    <button class="nav-btn" onclick="switchTab('mission',this)">🕵️ 秘密任務</button>
    <button class="nav-btn" onclick="switchTab('group',this)">👥 團體遊戲</button>
    <button class="nav-btn" onclick="showAward()">🎖 頒獎</button>
    <button class="reset-btn" onclick="resetPlayers()">🔄 重置玩家</button>
  </div>
  <div class="timer-bar">
    <div class="timer-display" id="timerDisplay">30</div>
    <div class="timer-controls">
      <button class="tbtn primary" id="timerStartBtn" onclick="timerToggle()">▶ 開始</button>
      <button class="tbtn" onclick="timerReset(30)">30s</button>
      <button class="tbtn" onclick="timerReset(60)">60s</button>
      <button class="tbtn" onclick="timerReset(120)">2min</button>
    </div>
    <div class="timer-label">計時器</div>
  </div>

  <!-- SCORE + BREAKDOWN combined -->
  <div class="panel active" id="panel-score">
    <div class="leaderboard"><div class="lb-title">LEADERBOARD</div><div id="lbList"></div></div>
    <div class="score-grid" id="scoreGrid"></div>
    <div class="card">
      <div class="slabel">依遊戲加分</div>
      <div class="game-select-row" id="gameSelectRow"></div>
      <div class="game-score-panel">
        <div class="game-score-title" id="gameScoreTitle">選擇遊戲</div>
        <div class="game-score-grid" id="gameScoreGrid"></div>
      </div>
    </div>
    <div class="card">
      <div class="slabel">完整明細表</div>
      <div style="overflow-x:auto"><table class="detail-table" id="detailTable"></table></div>
    </div>
  </div>

  <!-- ANSWERS -->
  <div class="panel" id="panel-answers">
    <div class="answer-game-tabs" id="answerGameTabs"></div>
    <div class="answer-panel-box" id="answerPanelBox"></div>
  </div>

  <!-- MISSION -->
  <div class="panel" id="panel-mission">
    <div class="mission-inner">
      <div class="mission-big-title">秘密任務抽籤</div>

let gameScores={},missionAssigned={},missionDone={},missionFailed={},availableMissions=[...MISSIONS];

window._allAnswers={};
window._gameScores=gameScores;

PLAYERS.forEach(p=>{gameScores[p.id]={};GAMES.forEach(g=>{gameScores[p.id][g]=0;});});
Object.keys(ANSWER_GAMES).forEach(g=>{answerQNum[g]=1;answerOpen[g]=false;answerRevealed[g]=false;});

function totalScore(id){return Math.round(Object.values(gameScores[id]).reduce((a,b)=>a+b,0)*10)/10;}
window._totalScore=totalScore;
function pushState(){if(window._pushState)window._pushState();}

function switchTab(tab,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
  if(tab==='score'){renderBreakdown();}
  if(tab==='answers')renderAnswerTabs();
  if(tab==='group')renderGroup();
}
window.switchTab=switchTab;

function addScore(pid,pts,game){
  game=game||activeGame;
  gameScores[pid][game]=Math.round((gameScores[pid][game]+pts)*10)/10;
  if(gameScores[pid][game]<0)gameScores[pid][game]=0;
  renderScoreGrid();renderLeaderboard();renderBreakdown();
  toast(`${PLAYERS[pid].name} ${pts>0?'+':''}${pts}分 (${game})`);
  pushState();
}
window.addScore=addScore;

function renderLeaderboard(){
  const sorted=PLAYERS.map(p=>({...p,score:totalScore(p.id)})).sort((a,b)=>b.score-a.score);
  const max=Math.max(...PLAYERS.map(p=>totalScore(p.id)),1);
  const medals=['🥇','🥈','🥉','4','5','6','7','8','9'];
  document.getElementById('lbList').innerHTML=sorted.map((p,i)=>`
    <div class="lb-row"><div class="lb-rank">${medals[i]}</div>
    <div class="lb-name" style="color:${p.color}">${p.name}</div>
    <div class="lb-bar-wrap"><div class="lb-bar" style="width:${(p.score/max)*100}%;background:${p.color}"></div></div>
    <div class="lb-pts">${p.score}</div></div>`).join('');
}
window._renderLeaderboard=renderLeaderboard;

function renderScoreGrid(){
  const sorted=[...PLAYERS].map(p=>({id:p.id,s:totalScore(p.id)})).sort((a,b)=>b.s-a.s);
  const ranks={};sorted.forEach((x,i)=>ranks[x.id]=i+1);
  document.getElementById('scoreGrid').innerHTML=PLAYERS.map(p=>{
    const r=ranks[p.id];
    const rb=r===1?'gold':r===2?'silver':r===3?'bronze':'';
    const rl=r===1?'🥇':r===2?'🥈':r===3?'🥉':`#${r}`;
    const md=missionDone[p.id]?'✅':missionFailed[p.id]?'❌':'';
    return `<div class="player-card" style="--player-color:${p.color}">
      <span class="rank-badge ${rb}">${rl}</span>
      ${md?`<span class="mbadge">${md}</span>`:''}
      <div class="player-avatar" style="background:${p.color}22;border:2px solid ${p.color}44;color:${p.color}">${p.name.slice(0,2)}</div>
      <div class="player-name">${p.name}</div>
      <div class="player-score" style="color:${p.color}">${totalScore(p.id)}</div>
      <div class="score-controls">
        <button class="sbtn" onclick="addScore(${p.id},2)">+2</button>
        <button class="sbtn" onclick="addScore(${p.id},1)">+1</button>
        <button class="sbtn" onclick="addScore(${p.id},0.5)">+½</button>
        <button class="sbtn minus" onclick="addScore(${p.id},-0.5)">-½</button>
        <button class="sbtn minus" onclick="addScore(${p.id},-1)">-1</button>
      </div></div>`;
  }).join('');
}
window._renderScoreGrid=renderScoreGrid;

function renderBreakdown(){
  document.getElementById('gameSelectRow').innerHTML=GAMES.map(g=>
    `<div class="game-tag ${g===activeGame?'active':''}" onclick="selectGame('${g}')">${g}</div>`).join('');
  document.getElementById('gameScoreTitle').textContent=activeGame;
  document.getElementById('gameScoreGrid').innerHTML=PLAYERS.map(p=>`
    <div class="gpi"><div class="gpi-name" style="color:${p.color}">${p.name}</div>
    <div class="gpi-pts" style="color:${p.color}">${gameScores[p.id][activeGame]||0}</div>
    <div class="gpi-ctrl">
      <button class="sbtn" onclick="addScore(${p.id},1,'${activeGame}')">+1</button>
      <button class="sbtn" onclick="addScore(${p.id},0.5,'${activeGame}')">+½</button>
      <button class="sbtn minus" onclick="addScore(${p.id},-0.5,'${activeGame}')">-½</button>
    </div></div>`).join('');
  const sorted=PLAYERS.map(p=>({...p,score:totalScore(p.id)})).sort((a,b)=>b.score-a.score);

    `<tr><th>玩家</th>${GAMES.map(g=>`<th>${g}</th>`).join('')}<th>總分</th></tr>`+
    sorted.map(p=>`<tr><td class="pc" style="color:${p.color}">${p.name}</td>${GAMES.map(g=>`<td>${gameScores[p.id][g]||0}</td>`).join('')}<td class="tc">${totalScore(p.id)}</td></tr>`).join('');
}
window.selectGame=function(g){activeGame=g;renderBreakdown();};

// ANSWERS
function renderAnswerTabs(){
  document.getElementById('answerGameTabs').innerHTML=Object.keys(ANSWER_GAMES).map(g=>
    `<div class="game-tag ${g===activeAnswerGame?'active':''}" onclick="selectAnswerGame('${g}')">${g}</div>`).join('');
  renderAnswerPanel();
}
window._renderAnswerPanel=renderAnswerPanel;

function renderAnswerPanel(){
  const g=activeAnswerGame;
  const info=ANSWER_GAMES[g];
  const qNum=answerQNum[g]||1;
  const isOpen=answerOpen[g];
  const isRevealed=answerRevealed[g];
  const answers=(window._allAnswers[g]||{})[qNum]||{};
  const correctAns=info.answers[qNum-1]||'';
  const box=document.getElementById('answerPanelBox');
  box.innerHTML=`
    <div class="answer-panel-title">${g}<span class="asbadge ${isOpen?'open':''}">${isOpen?'● 作答中':isRevealed?'✓ 已公布':'待開放'}</span></div>

      <div class="q-num">Q${qNum}</div>
      <div class="q-total">/ ${info.total}</div>
    </div>
    <div class="correct-answer-display">✅ 正確答案：${correctAns}</div>
    <div class="ctrl-row">
      <button class="open-btn" onclick="toggleAnswer('${g}')">${isOpen?'⏸ 關閉作答':'▶ 開放作答'}</button>
      <button class="reveal-btn" onclick="revealAnswer('${g}')">👁 公布答案</button>
      ${qNum<info.total?`<button class="next-btn" onclick="nextQuestion('${g}')">下一題 ▶</button>`:'<span style="font-size:12px;color:var(--teal)">✓ 最後一題</span>'}
    </div>
    <div class="answers-grid">
      ${PLAYERS.map(p=>{
        const a=answers[p.id];
        return`<div class="ac ${a?'has':''}">
          <div class="ac-name" style="color:${p.color}">${p.name}</div>
          ${a?`<div class="ac-text ${isRevealed?'':'blur'}">${a.answer}</div>`:`<div class="ac-wait">⏳</div>`}
        </div>`;
      }).join('')}
    </div>`;
}

window.selectAnswerGame=function(g){activeAnswerGame=g;renderAnswerTabs();};
window.toggleAnswer=function(g){
  answerOpen[g]=!answerOpen[g];
  answerRevealed[g]=false;
  const qNum=answerQNum[g]||1;
  if(window._pushAnswerState)window._pushAnswerState(g,qNum,{open:answerOpen[g],revealed:false,ts:Date.now()});
  renderAnswerPanel();
  toast(answerOpen[g]?`Q${qNum} 作答開放！`:`Q${qNum} 作答關閉`);
};
window.revealAnswer=function(g){
  answerRevealed[g]=true;answerOpen[g]=false;
  const qNum=answerQNum[g]||1;
  const correctAns=ANSWER_GAMES[g].answers[qNum-1]||'';
  if(window._pushAnswerState)window._pushAnswerState(g,qNum,{open:false,revealed:true,correctAnswer:correctAns,ts:Date.now()});

  toast(`Q${qNum} 答案已公布！`);
};
window.nextQuestion=function(g){
  answerQNum[g]=(answerQNum[g]||1)+1;
  answerOpen[g]=false;answerRevealed[g]=false;
  const qNum=answerQNum[g];
  if(window._pushAnswerState)window._pushAnswerState(g,qNum,{open:false,revealed:false,ts:Date.now()});
  renderAnswerPanel();
  toast(`切換到 Q${qNum}`);
};

// MISSION
function renderDrawSelect(){
  document.getElementById('drawSelect').innerHTML='<option value="">— 選擇玩家 —</option>'+
    PLAYERS.filter(p=>!(p.id in missionAssigned)).map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
}
window.drawMission=function(){
  const sel=document.getElementById('drawSelect');const pid=parseInt(sel.value);
  if(isNaN(pid)){toast('請先選擇玩家 👆');return;}
  if(availableMissions.length===0){toast('任務已全部分配');return;}
  const idx=Math.floor(Math.random()*availableMissions.length);
  const mission=availableMissions.splice(idx,1)[0];
  missionAssigned[pid]=mission;
  document.getElementById('revealPlayer').textContent=PLAYERS[pid].name;
  document.getElementById('revealTask').textContent=mission;
  document.getElementById('missionReveal').style.display='block';
  document.getElementById('drawBtn').disabled=true;
  renderDrawSelect();renderMissionStatus();pushState();
};
window.confirmMission=function(){
  document.getElementById('missionReveal').style.display='none';
  document.getElementById('drawBtn').disabled=false;
  document.getElementById('drawSelect').value='';
  toast('已確認，螢幕已清除 ✓');
};
window.completeMission=function(pid){
  if(missionDone[pid]||missionFailed[pid])return;
  missionDone[pid]=true;
  const isFirst=Object.keys(missionDone).length===1;
  addScore(pid,3,'秘密任務');
  if(isFirst)addScore(pid,1,'秘密任務');
  renderMissionStatus();renderScoreGrid();
  toast(isFirst?`🎉 ${PLAYERS[pid].name} 第一個完成！+4分！神秘禮物！`:`✅ ${PLAYERS[pid].name} 完成任務！+3分！`);
};
window.failMission=function(pid){
  if(missionDone[pid]||missionFailed[pid])return;
  missionFailed[pid]=true;
  renderMissionStatus();renderScoreGrid();
  toast(`❌ ${PLAYERS[pid].name} 的任務被發現！0分`);
  pushState();
};
function renderMissionStatus(){
  document.getElementById('missionStatusList').innerHTML=PLAYERS.map(p=>{
    const drawn=p.id in missionAssigned,done=missionDone[p.id],failed=missionFailed[p.id];
    const dc=done?'done':failed?'failed':drawn?'drawn':'';
    const st=done?'✅ 完成 +3':failed?'❌ 被發現':drawn?'🎲 已抽到':'⏳ 未抽';
    const btns=drawn&&!done&&!failed?`<div class="mbtns"><button class="mcbtn" onclick="completeMission(${p.id})">完成</button><button class="mfbtn" onclick="failMission(${p.id})">被發現</button></div>`:'';
    return`<div class="mrow"><div class="mdot ${dc}"></div><div class="mname">${p.name}</div><div class="mstate">${st}</div>${btns}</div>`;
  }).join('');
}
window._renderMissionStatus=renderMissionStatus;

  const unassigned=PLAYERS.filter(p=>!assigned.includes(p.id));
  document.getElementById('wordUnassigned').innerHTML=unassigned.map(p=>
    `<div class="uchip" style="border-color:${p.color};color:${p.color}" onclick="assignWord(${p.id})">${p.name}</div>`).join('');
  document.getElementById('wordTeams').innerHTML=['A','B','C'].map(t=>`
    <div class="team-box">
      <div class="team-label" style="color:${TEAM_COLORS[t]}">⭐ ${t} 組 <span style="font-family:'Bebas Neue',sans-serif;font-size:24px">${wordScores[t]}</span></div>
      <div class="team-members">${wordTeams[t].map(id=>{const p=PLAYERS[id];return`<div class="tmc" style="border-color:${TEAM_COLORS[t]};color:${TEAM_COLORS[t]};background:${TEAM_COLORS[t]}22" onclick="removeWord(${id},'${t}')">${p.name} ✕</div>`;}).join('')}</div>
    </div>`).join('');
}

window.assignDance=function(pid){
  if(danceTeams.A.length<=danceTeams.B.length)danceTeams.A.push(pid);else danceTeams.B.push(pid);
  renderDanceGroup();
};
window.removeDance=function(pid,t){danceTeams[t]=danceTeams[t].filter(x=>x!==pid);renderDanceGroup();};
window.danceCorrect=function(t){danceScores[t]++;renderDanceGroup();toast(`${t}隊猜中 +1！(${t}隊 ${danceScores[t]}分)`);};
window.danceFinish=function(){
  const winner=danceScores.A>danceScores.B?'A':danceScores.B>danceScores.A?'B':'平手';
  if(winner==='平手'){toast('平手！兩隊都加分！');['A','B'].forEach(t=>danceTeams[t].forEach(pid=>addScore(pid,3,'跳舞接龍')));}
  else{toast(`🏆 ${winner}隊獲勝！全員+3分！`);danceTeams[winner].forEach(pid=>addScore(pid,3,'跳舞接龍'));}
};
window.resetDance=function(){danceTeams={A:[],B:[]};danceScores={A:0,B:0};renderDanceGroup();};

window.assignWord=function(pid){
  const counts=[wordTeams.A.length,wordTeams.B.length,wordTeams.C.length];
  const minIdx=counts.indexOf(Math.min(...counts));
  ['A','B','C'][minIdx]&&wordTeams[['A','B','C'][minIdx]].push(pid);
  renderWordGroup();
};
window.removeWord=function(pid,t){wordTeams[t]=wordTeams[t].filter(x=>x!==pid);renderWordGroup();};
window.wordCorrect=function(t){
  wordScores[t]++;
  wordTeams[t].forEach(pid=>addScore(pid,1,'詞語接龍'));
  renderWordGroup();
  toast(`${t}組完成一個詞！全員+1分！`);
};
window.resetWord=function(){wordTeams={A:[],B:[],C:[]};wordScores={A:0,B:0,C:0};renderWordGroup();};

// RESET PLAYERS
window.resetPlayers=function(){
  if(!confirm('確定要重置所有玩家登入狀態嗎？'))return;
  if(window._resetPlayers)window._resetPlayers();
  toast('✅ 玩家已重置！');
};

// AWARD - reveal one by one
let awardSorted=[];
window.showAward=function(){
  awardSorted=PLAYERS.map(p=>({...p,score:totalScore(p.id)})).sort((a,b)=>b.score-a.score);
  document.querySelectorAll('.reveal-step').forEach(s=>s.classList.remove('show'));
  document.getElementById('awardOverlay').classList.add('show');
  startConfetti();
  showRank(3);
};
window.showRank=function(rank){
  document.querySelectorAll('.reveal-step').forEach(s=>s.classList.remove('show'));
  const p=awardSorted[rank-1];if(!p)return;
  document.getElementById(`avatar${rank}`).style.background=p.color+'33';
  document.getElementById(`avatar${rank}`).style.borderColor=p.color;
  document.getElementById(`avatar${rank}`).style.color=p.color;
  document.getElementById(`avatar${rank}`).style.boxShadow=`0 0 40px ${p.color}66`;
  document.getElementById(`avatar${rank}`).textContent=p.name.slice(0,2);
  document.getElementById(`name${rank}`).textContent=p.name;
  document.getElementById(`name${rank}`).style.color=p.color;
  document.getElementById(`score${rank}`).textContent=p.score+'分';
  document.getElementById(`revealStep${rank}`).classList.add('show');
};
window.closeAward=function(){document.getElementById('awardOverlay').classList.remove('show');stopConfetti();};

let confettiAnim;
function startConfetti(){
  const canvas=document.getElementById('confettiCanvas');const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:150},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*8+4,color:['#c050ff','#ff40cc','#ffcc00','#00f0c8','#ff8040','#80aaff'][Math.floor(Math.random()*6)],speed:Math.random()*3+1,wobble:Math.random()*2-1,angle:Math.random()*360}));
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{p.y+=p.speed;p.x+=p.wobble;p.angle+=3;if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();});confettiAnim=requestAnimationFrame(draw);}
  draw();
}
function stopConfetti(){cancelAnimationFrame(confettiAnim);const c=document.getElementById('confettiCanvas');c.getContext('2d').clearRect(0,0,c.width,c.height);}

// TIMER
let timerVal=30,timerRunning=false,timerInterval=null;
window.timerToggle=function(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerStartBtn').textContent='▶ 繼續';}
  else{timerRunning=true;document.getElementById('timerStartBtn').textContent='⏸ 暫停';
    timerInterval=setInterval(()=>{timerVal--;updateTimerDisplay();if(timerVal<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerStartBtn').textContent='▶ 重新開始';playTimeUpSound();toast('⏰ 時間到！');}},1000);}
};
window.timerReset=function(s){clearInterval(timerInterval);timerRunning=false;timerVal=s;document.getElementById('timerStartBtn').textContent='▶ 開始';updateTimerDisplay();};
function updateTimerDisplay(){const el=document.getElementById('timerDisplay');const m=Math.floor(timerVal/60),s=timerVal%60;el.textContent=m>0?`${m}:${String(s).padStart(2,'0')}`:String(timerVal);el.className='timer-display'+(timerVal<=10&&timerVal>0?' warning':'');}
function playTimeUpSound(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.3);o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.3);});}catch(e){}}

function toast(msg){const wrap=document.getElementById('toastWrap');const el=document.createElement('div');el.className='toast';el.textContent=msg;wrap.appendChild(el);setTimeout(()=>el.remove(),3500);}
document.getElementById('logoImg').onerror=function(){this.style.display='none';document.getElementById('fallbackTitle').style.display='block';};
renderScoreGrid();renderLeaderboard();renderBreakdown();renderDrawSelect();renderMissionStatus();
</script>
</body>
</html>
